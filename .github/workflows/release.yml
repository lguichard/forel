name: Release

# Required to publish the Homebrew cask to lab421/homebrew-tap:
#   HOMEBREW_TAP_TOKEN (a PAT with `contents: write` on that repo)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: macos-26
            arch: arm64
            suffix: darwin-arm64
          - runs_on: macos-26
            arch: x86_64
            suffix: darwin-x86_64
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          xcode_app="$(ls -1d /Applications/Xcode*.app | sort -V | tail -n 1)"
          sudo xcode-select -switch "$xcode_app/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Build and package
        id: package
        env:
          RELEASE_ARCH: ${{ matrix.arch }}
          RELEASE_SUFFIX: ${{ matrix.suffix }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ./build.sh package "$RELEASE_ARCH" "$RELEASE_TAG"
          echo "dmg_path=dist/release/Forel-${RELEASE_TAG}-${RELEASE_SUFFIX}.dmg" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact (${{ matrix.suffix }})
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.suffix }}
          path: ${{ steps.package.outputs.dmg_path }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Release notes from CHANGELOG
        id: notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -Fq "## [$VERSION]" CHANGELOG.md; then
            echo "CHANGELOG.md has no entry for $VERSION" >&2
            exit 1
          fi
          NOTES="$(awk -v hdr="## [$VERSION]" 'index($0,hdr)==1{g=1;next} /^## \[/&&g{exit} g{print}' CHANGELOG.md)"
          if [[ -z "${NOTES//[[:space:]]/}" ]]; then
            echo "CHANGELOG.md entry for $VERSION is empty" >&2
            exit 1
          fi
          {
            echo "BODY<<__FOREL_EOF__"
            echo "## Forel $RELEASE_TAG"
            echo ""
            printf '%s\n' "$NOTES"
            echo ""
            echo "Two builds available. Download the one that matches your Mac:"
            echo "- \`Forel-${RELEASE_TAG}-darwin-arm64.dmg\` Apple Silicon (M1 / M2 / M3 / M4)"
            echo "- \`Forel-${RELEASE_TAG}-darwin-x86_64.dmg\` for Intel"
            echo ""
            echo "Requires **macOS 14 Sonoma or later**."
            echo ""
            echo "1. Download the correct .dmg for your Mac."
            echo "2. Open it and drag **Forel** into **Applications**."
            echo "3. First launch: the app is ad-hoc signed (not notarized), so right-click **Forel.app -> Open** and confirm. (Or run \`xattr -cr /Applications/Forel.app\`.)"
            echo "__FOREL_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*.dmg
          prerelease: false
          make_latest: true
          body: ${{ steps.notes.outputs.BODY }}

  homebrew:
    needs: publish
    runs-on: macos-14
    steps:
      - name: Download release files
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: lab421/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Cask
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          arm_sha="$(shasum -a 256 "dist/release/Forel-${GITHUB_REF_NAME}-darwin-arm64.dmg" | cut -d ' ' -f1)"
          intel_sha="$(shasum -a 256 "dist/release/Forel-${GITHUB_REF_NAME}-darwin-x86_64.dmg" | cut -d ' ' -f1)"

          cat > homebrew-tap/Casks/forel.rb <<EOF
          cask "forel" do
            arch arm: "arm64", intel: "x86_64"

            version "${version}"
            sha256 arm:   "${arm_sha}",
                   intel: "${intel_sha}"

            url "https://github.com/lab421/forel/releases/download/v#{version}/Forel-v#{version}-darwin-#{arch}.dmg"
            name "Forel"
            desc "File-automation app that watches folders and runs rules"
            homepage "https://github.com/lab421/forel"

            livecheck do
              url :url
              strategy :github_latest
              regex(/^v?(\d+\.\d+\.\d+(?:-(?:alpha|beta|rc)\.\d+)?)\$/i)
            end

            depends_on macos: :sonoma

            app "Forel.app"

            zap trash: [
              "~/Library/Application Support/com.lab421.forel",
              "~/Library/Caches/com.lab421.forel",
              "~/Library/Application Support/com.forel.app",
              "~/Library/Caches/com.forel.app",
            ]
          end
          EOF

      - name: Commit and push
        run: |
          set -euo pipefail
          cd homebrew-tap
          git config user.name "forel-release-bot"
          git config user.email "actions@users.noreply.github.com"
          git add Casks/forel.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "forel ${GITHUB_REF_NAME#v}"
          git push
