name: Release

# Publishes two .dmg files (Intel + Apple Silicon) to a GitHub Release
# whenever a version tag is pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the release and upload assets

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: arm64
            suffix: apple-silicon
          - arch: amd64
            suffix: intel
    # Both builds run on the arm64 runner (macos-14).
    # The amd64 build cross-compiles via GOARCH=amd64 + Xcode clang targeting x86_64.
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Wails3 CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.98
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build .app (${{ matrix.arch }})
        run: wails3 task package
        env:
          ARCH: ${{ matrix.arch }}

      - name: Create .dmg (${{ matrix.arch }})
        run: |
          STAGING="$(mktemp -d)"
          cp -R bin/Forel.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "Forel" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "bin/Forel-${GITHUB_REF_NAME}-${{ matrix.suffix }}.dmg"
          rm -rf "$STAGING"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Forel-*-${{ matrix.suffix }}.dmg
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Forel ${{ github.ref_name }}

            Two builds available — download the one that matches your Mac:
            - `Forel-${{ github.ref_name }}-apple-silicon.dmg` → M1 / M2 / M3 / M4
            - `Forel-${{ github.ref_name }}-intel.dmg` → Intel (x86_64)

            Requires **macOS 14 Sonoma or later**.

            ### Install
            1. Download the correct .dmg for your Mac.
            2. Open it and drag **Forel** into **Applications**.
            3. First launch: the app is ad-hoc signed (not notarized), so right-click
               **Forel.app → Open** and confirm. (Or run `xattr -cr /Applications/Forel.app`.)
