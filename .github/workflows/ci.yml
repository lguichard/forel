name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          xcode_app="$(ls -1d /Applications/Xcode*.app | sort -V | tail -n 1)"
          sudo xcode-select -switch "$xcode_app/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
