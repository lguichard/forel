name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # macOS runner: the rules tests exercise real macOS Finder tags (xattr).
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend deps (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm lint

      - name: Build frontend (tsc + vite)
        run: pnpm build

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Check Rust warnings
        run: |
          warnings="$(cargo check --manifest-path src-tauri/Cargo.toml 2>&1 | grep '^warning' || true)"
          if [ -n "$warnings" ]; then
            echo "$warnings"
            exit 1
          fi

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml
