edition = "2021"

# Maximum line length before rustfmt breaks a line.
max_width = 100

# Always use trailing commas in multi-line constructs.
trailing_comma = "Always"

# Imports: merge, deduplicate, and sort by std → external → crate.
imports_granularity = "Module"
group_imports = "StdExternalCrate"

# Put each struct field on its own line when the struct is multi-line.
struct_lit_single_line = false

# Use the more readable style for match arms that have blocks.
match_block_trailing_comma = true

# Normalize doc comments to ///.
normalize_doc_attributes = true
